<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>משחק עצור – חשוב – פעל | هويدا قطيش فاعور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a4d6e, #0c334b);
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 850px;
            width: 100%;
            background: #fffaf2;
            border-radius: 65px 65px 55px 55px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: 0.2s;
            position: relative;
        }

        @keyframes sparkle {
            0% { text-shadow: 0 0 0px gold; transform: scale(1); }
            50% { text-shadow: 0 0 20px gold, 0 0 30px orange; transform: scale(1.05); }
            100% { text-shadow: 0 0 0px gold; transform: scale(1); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }

        .sparkle-effect {
            animation: sparkle 0.6s ease-in-out;
        }

        .wrong-effect {
            animation: shake 0.4s ease-in-out;
            background-color: #ffe0e0 !important;
        }

        .confetti-burst {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: gold;
            opacity: 0.8;
            animation: fall 1s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .header {
            background: linear-gradient(120deg, #fa8128, #f45c2e);
            padding: 20px 20px 15px;
            text-align: center;
            color: white;
            border-bottom: 5px solid #ffdd99;
        }

        .header h1 {
            font-size: 1.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-area {
            background: #fef0da;
            padding: 12px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.3rem;
            border-bottom: 2px solid #ffcd88;
        }

        .stars span {
            font-size: 1.8rem;
            letter-spacing: 5px;
        }

        .card {
            padding: 20px 25px 25px;
        }

        .situation-img {
            background: #fff1e0;
            text-align: center;
            padding: 20px;
            border-radius: 55px;
            margin-bottom: 20px;
            font-size: 5rem;
            box-shadow: inset 0 0 0 4px white, 0 10px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .situation-text {
            background: #f7e8d6;
            padding: 20px;
            border-radius: 55px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            color: #3e2c1c;
            border-right: 8px solid #ff9940;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: white;
            border: 2px solid #ffaf60;
            border-radius: 100px;
            padding: 14px 18px;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            color: #2c4b32;
        }

        .option-btn:hover:not(:disabled) {
            background: #ffe6ce;
            transform: scale(1.01);
            border-color: #f45c2e;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        .option-emoji {
            font-size: 2.2rem;
            min-width: 55px;
            text-align: center;
        }

        .feedback {
            background: #eef4fc;
            border-radius: 50px;
            padding: 15px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0 20px;
            border-right: 6px solid #2e8b57;
            transition: 0.2s;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .nav-btn {
            background: #fa8128;
            border: none;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            width: 48%;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.reset-btn {
            background: #3d7ea6;
        }

        .nav-btn:hover:not(:disabled) {
            background: #e06e18;
            transform: scale(0.98);
        }

        .nav-btn.reset-btn:hover:not(:disabled) {
            background: #2f6282;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer-credit {
            background: #ffecce;
            text-align: center;
            padding: 18px;
            font-size: 1rem;
            color: #7a5a3a;
            border-top: 1px solid #ffd6a5;
            font-weight: bold;
            line-height: 1.8;
        }

        .question-counter {
            background: #ffdbb5;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 1rem;
            color: #b45f2b;
        }

