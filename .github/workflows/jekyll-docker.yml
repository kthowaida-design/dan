<script>
    // יצירת צלילים
    function playSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (type === 'correct') {
                // צליל שמח ומעודד לתשובה נכונה
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                const now = audioCtx.currentTime;
                
                oscillator.frequency.value = 880;
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                oscillator.start();
                oscillator.stop(now + 0.2);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 1100;
                gain2.gain.setValueAtTime(0.3, now + 0.1);
                gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                osc2.start();
                osc2.stop(now + 0.3);
                
                const osc3 = audioCtx.createOscillator();
                const gain3 = audioCtx.createGain();
                osc3.connect(gain3);
                gain3.connect(audioCtx.destination);
                osc3.frequency.value = 1320;
                gain3.gain.setValueAtTime(0.25, now + 0.2);
                gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
                osc3.start();
                osc3.stop(now + 0.4);
                
            } else {
                // צליל גבוה וברור לתשובה לא נכונה
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'triangle';
                const now = audioCtx.currentTime;
                
                oscillator.frequency.value = 520;
                gainNode.gain.setValueAtTime(0.35, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                oscillator.start();
                oscillator.stop(now + 0.3);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sawtooth';
                osc2.frequency.value = 380;
                gain2.gain.setValueAtTime(0.4, now + 0.15);
                gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                osc2.start();
                osc2.stop(now + 0.45);
                
                const osc3 = audioCtx.createOscillator();
                const gain3 = audioCtx.createGain();
                osc3.connect(gain3);
                gain3.connect(audioCtx.destination);
                osc3.type = 'sine';
                osc3.frequency.value = 280;
                gain3.gain.setValueAtTime(0.3, now + 0.25);
                gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
                osc3.start();
                osc3.stop(now + 0.5);
            }
        } catch(e) { 
            console.log("Audio not supported"); 
        }
    }

    // יצירת נצנצים
    function createConfetti() {
        const container = document.createElement('div');
        container.className = 'confetti-burst';
        document.body.appendChild(container);
        
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
            confetti.style.width = Math.random() * 12 + 6 + 'px';
            confetti.style.height = Math.random() * 12 + 6 + 'px';
            confetti.style.animationDuration = Math.random() * 1 + 0.8 + 's';
            confetti.style.animationDelay = Math.random() * 0.3 + 's';
            container.appendChild(confetti);
        }
        
        setTimeout(() => {
            container.remove();
        }, 1200);
    }

