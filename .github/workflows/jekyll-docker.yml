            { text: "أكسر أقلامي", correct: false, emoji: "✏️💢" },
            { text: "أشتم الجيران", correct: false, emoji: "🤬🏘️" }
        ] },
        { text: "😤📚 المعلمة أعطتني واجباً صعباً جداً، لا أعرف من أين أبدأ. ماذا أفعل؟", img: "📚😰💢", options: [
            { text: "أمزق الورقة", correct: false, emoji: "📄💥" },
            { text: "أطلب المساعدة بهدوء: 'أحتاج شرحاً'", correct: true, emoji: "🙋‍♂️📖" },
            { text: "أبصق على الدفتر", correct: false, emoji: "💦📓" },
            { text: "أصرخ وأهرب", correct: false, emoji: "🏃😤" }
        ] },
        { text: "🍽️😠 أمي طبخت طعاماً لا أحبه، طلبت مني أن آكل. ماذا أفعل؟", img: "🍲😖❌", options: [
            { text: "أرمي الصحون", correct: false, emoji: "🍽️💢" },
            { text: "أقول: 'لا أحب هذا، هل يمكنني أكل شيء آخر؟'", correct: true, emoji: "🗣️🍞" },
            { text: "أبصق في الطعام", correct: false, emoji: "💦🍲" },
            { text: "أصرخ ولا آكل", correct: false, emoji: "😤🚫" }
        ] },
        { text: "🛏️😴 لا أستطيع النوم لأن الأفكار تدور في رأسي. ماذا أفعل؟", img: "🌙😖💭", options: [
            { text: "أصرخ وأضرب الوسادة", correct: false, emoji: "😫🛏️" },
            { text: "آخذ نفساً عميقاً وأطلب من أمي قراءة قصة", correct: true, emoji: "📖🌙" },
            { text: "أشتم وأبصق", correct: false, emoji: "🤬💦" },
            { text: "أقوم وأشغل التلفاز", correct: false, emoji: "📺😠" }
        ] },
        { text: "🎁😠 أعطتني أمي هدية لكنها ليست التي أردتها. أشعر بخيبة أمل. ماذا أفعل؟", img: "🎁😞💔", options: [
            { text: "أرمي الهدية وأصرخ", correct: false, emoji: "🎁💢" },
            { text: "أشكرها رغم أنني متضايق، وأقول 'سأجربها'", correct: true, emoji: "🙏😊" },
            { text: "أبصق على الهدية", correct: false, emoji: "💦🎁" },
            { text: "أغلق باب غرفتي", correct: false, emoji: "🚪😤" }
        ] },
        { text: "👩‍⚕️😣 أمي أخذتني للطبيب وأنا خائف جداً من الإبر. ماذا أفعل؟", img: "💉😨🏥", options: [
            { text: "أصرخ وأهرب", correct: false, emoji: "🏃😫" },
            { text: "آخذ نفساً عميقاً وأقول للطبيب: 'أنا خائف'", correct: true, emoji: "🌬️🩺" },
            { text: "أبصق على الطبيب", correct: false, emoji: "💦👨‍⚕️" },
            { text: "أضرب أمي", correct: false, emoji: "👊😢" }
        ] }
    ];

    let currentScenarios = [];
    let currentIndex = 0;
    let starsEarned = 0;
    let answered = [];
    let selectedCorrect = [];

    const situationTextEl = document.getElementById("situationText");
    const situationImgEl = document.getElementById("situationImg");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackMsg = document.getElementById("feedbackMsg");
    const starsDisplay = document.getElementById("starsDisplay");
    const questionCounterEl = document.getElementById("questionCounter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    function updateStarsUI() {
        let starStr = "";
        for (let i=0; i<starsEarned; i++) starStr += "⭐";
        for (let i=starsEarned; i<currentScenarios.length; i++) starStr += "☆";
        starsDisplay.innerText = starStr;
    }

    function updateCounter() {
        questionCounterEl.innerText = `السؤال ${currentIndex+1} من ${currentScenarios.length}`;
    }

    function createSparkleEffect(element) {
        element.classList.add('sparkle-effect');
        setTimeout(() => element.classList.remove('sparkle-effect'), 600);
    }

    function createWrongEffect(element) {
        element.classList.add('wrong-effect');
        setTimeout(() => element.classList.remove('wrong-effect'), 400);
    }

    function renderCurrent() {
        const s = currentScenarios[currentIndex];
        situationTextEl.innerHTML = s.text;
        situationImgEl.innerHTML = s.img + "  🧠💭";
        optionsContainer.innerHTML = "";
        
        s.options.forEach((opt, idx) => {
            const btnDiv = document.createElement("div");
            btnDiv.className = "option-btn";
            if (answered[currentIndex]) btnDiv.style.pointerEvents = "none";
            btnDiv.innerHTML = `<span class="option-emoji">${opt.emoji}</span><span>${opt.text}</span>`;
            btnDiv.addEventListener("click", () => {
                if (answered[currentIndex]) return;
                
                if (opt.correct) {
                    playSound('correct');
                    createConfetti();
                    createSparkleEffect(situationImgEl);
                    createSparkleEffect(feedbackMsg);
                    
                    if (!answered[currentIndex]) {
                        starsEarned++;
                        answered[currentIndex] = true;
                        selectedCorrect[currentIndex] = true;
                        updateStarsUI();
                        feedbackMsg.innerHTML = "🎉🌟✅ ممتاز! إجابة صحيحة! أحسنت! 🎉👏✨";
                        feedbackMsg.style.background = "#d9f0e1";
                        feedbackMsg.style.borderRightColor = "#2ecc71";
                        renderCurrent();
                    }
                } else {
                    playSound('wrong');
                    createWrongEffect(btnDiv);
                    createWrongEffect(feedbackMsg);
                    
                    feedbackMsg.innerHTML = "🔔❌ للأسف إجابة غير صحيحة... فكر بهدوء: ماذا يمكنك أن تفعل بطريقة محترمة؟ حاول مرة أخرى 🌱💪";
                    feedbackMsg.style.background = "#ffe0e0";
                    feedbackMsg.style.borderRightColor = "#e67e22";
                }
            });
            optionsContainer.appendChild(btnDiv);
        });
        
        if (answered[currentIndex]) {
            const correctOptions = currentScenarios[currentIndex].options.filter(o=>o.correct).map(o=>o.text).join(" أو ");
            feedbackMsg.innerHTML = `✅✨ أحسنت! لقد حصلت على نجمة! الإجابة الصحيحة: ${correctOptions} ✨🎉`;
            feedbackMsg.style.background = "#d9f0e1";
        }
        
        prevBtn.disabled = (currentIndex === 0);
        updateCounter();
    }

    // בחירת 10 שאלות אקראיות ללא חזרות
    function selectRandomQuestions() {
        const shuffled = [...allScenarios];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 10);
    }

    function initGame() {
        currentScenarios = selectRandomQuestions();
        currentIndex = 0;
        starsEarned = 0;
        answered = new Array(currentScenarios.length).fill(false);
        selectedCorrect = new Array(currentScenarios.length).fill(false);
        updateStarsUI();
        renderCurrent();
        feedbackMsg.innerHTML = "🎮✨ مرحباً! كل لعبة أسئلة جديدة. اختر الإجابة الصحيحة واحصل على نجوم! ✨🎮";
        feedbackMsg.style.background = "#eef4fc";
    }

    function nextScenario() {
        if (currentIndex < currentScenarios.length - 1) {
            currentIndex++;
            renderCurrent();
        } else {
            const message = starsEarned === currentScenarios.length 
                ? "🏆🎉 مذهل! أجبت على جميع الأسئلة بشكل صحيح! أنت بطل التنظيم الانفعالي! 🎉🏆"
                : `✨ انتهيت! حصلت على ${starsEarned} من أصل ${currentScenarios.length} نجوم. اضغط 'لعب من جديد' لأسئلة جديدة ✨`;
            feedbackMsg.innerHTML = message;
        }
    }
    
    function prevScenario() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrent();
        }
    }
    
    function resetGame() {
        initGame();
    }

    prevBtn.addEventListener("click", prevScenario);
    nextBtn.addEventListener("click", nextScenario);
    resetBtn.addEventListener("click", resetGame);

    initGame();
</script>
</body>
</html>
